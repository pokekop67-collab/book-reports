<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📚 覺醒 v2｜獨立書評</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--a:#667eea;--ap:#f093fb;--tp:#2D3436;--ts:#636E72;--tl:#B2BEC3;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;font-weight:300;line-height:1.8;color:var(--tp);background:linear-gradient(135deg,#E8F4FD,#FFF0F5,#F5F0FF);min-height:100vh;padding:40px 20px;}
.container{max-width:800px;margin:0 auto;}
.hero{text-align:center;padding:60px 40px;margin-bottom:40px;background:rgba(255,255,255,.6);backdrop-filter:blur(20px);border-radius:32px;border:1px solid rgba(255,255,255,.8);box-shadow:0 20px 60px rgba(0,0,0,.08);}
.hero h1{font-family:'Noto Serif TC',serif;font-size:2.2rem;font-weight:700;background:linear-gradient(135deg,var(--a),var(--ap));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;}
.hero p{color:var(--ts);font-size:1rem;}
.book{display:block;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);border-radius:24px;border:1px solid rgba(255,255,255,.5);box-shadow:0 8px 32px rgba(0,0,0,.08);padding:32px;margin-bottom:20px;text-decoration:none;color:var(--tp);transition:transform .3s,box-shadow .3s;}
.book:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.12);}
.book h2{font-family:'Noto Serif TC',serif;font-size:1.3rem;font-weight:700;color:var(--a);margin-bottom:8px;}
.book .meta{font-size:.85rem;color:var(--ts);margin-bottom:10px;}
.book .desc{font-size:.92rem;line-height:1.7;}
.tag{display:inline-block;padding:2px 8px;border-radius:14px;font-size:.7rem;margin:2px;background:rgba(102,126,234,.1);color:var(--a);}
footer{text-align:center;padding:40px;color:var(--tl);font-size:.85rem;}
footer a{color:var(--a);text-decoration:none;}
@media(max-width:768px){.hero{padding:40px 20px;}.hero h1{font-size:1.6rem;}.book{padding:24px 18px;}}
</style>
</head>
<body>
<div class="container">

<header class="hero">
  <h1>📚 覺醒 v2｜獨立書評</h1>
  <p>每一本書，一份完整的深度解構分析</p>
  <p style="font-size:.85rem;color:var(--tl);margin-top:10px;">🐉 龍龍 × 覺醒系統 v2</p>
</header>

<a class="book" href="selling-expression.html">
  <h2>🎙️ 說到賣得動</h2>
  <div class="meta">小竺 著｜時報出版 2025｜三源整合分析（26KB）</div>
  <div class="desc">
    高價值商業表達力的深度解構。融合書本試閱（Ch1-6）、簽書會逐字稿獨家內容、TOC 瓶頸突破系統——三份分析的完整整合版。KISS 框架、Why-What-How 思考序列、消費決策旅程五階段、ABCDE 自我介紹模組。
  </div>
  <div style="margin-top:12px;">
    <span class="tag">KISS 框架</span>
    <span class="tag">Why-What-How</span>
    <span class="tag">消費決策旅程</span>
    <span class="tag">期望值管理</span>
    <span class="tag">TOC 瓶頸突破</span>
  </div>
</a>

<footer>
  <p>✧ 覺醒系統 v2 完全體分析 ✧</p>
  <p>🐉 龍龍 · 2026</p>
  <p style="margin-top:10px;"><a href="../ten-books/">← 十書聯展</a>　｜　<a href="../">首頁</a></p>
</footer>

</div>
</body>
</html>
